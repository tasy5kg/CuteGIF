}

def localProps = new Properties()
file("${rootProject.projectDir}/local.properties").withInputStream { localProps.load(it) }

android {
  signingConfigs {
    release {
      storeFile file(localProps['signing.keystore'])
      storePassword localProps['signing.keystore.password']
      keyAlias localProps['signing.key.alias']
      keyPassword localProps['signing.key.password']
    }
  }
  packagingOptions {
    jniLibs {
      useLegacyPackaging true
    }
  }
  defaultConfig {
    applicationId "com.nht.gif"
    minSdk 29
    targetSdk 35
    compileSdk 36
    versionCode 202604001
    versionName '2026.4.1'
    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    setProperty "archivesBaseName", "EasyGIF_${versionName}_${versionCode}"
  }

  buildTypes {
    release {
      signingConfig signingConfigs.release
      minifyEnabled true
      shrinkResources true
      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
      debuggable false
    }
    debug {
      minifyEnabled false
      shrinkResources false
      debuggable true
    }
  }
  buildFeatures {
    viewBinding true
    buildConfig true
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions {
    jvmTarget = JavaVersion.VERSION_17.toString()
  }
  namespace 'com.nht.gif'
}

